<!DOCTYPE html>
<html>
<head>
  <title>Food Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .food-card img {
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>
<body class="container mt-5">
  <h1 class="text-center mb-5">🍔 Food Delivery</h1>
  <div class="row">
    {% for food in foods %}
    <div class="col-md-3 mb-4">
      <div class="card food-card shadow-sm">
        {% if food.image %}
        <img src="{{ food.image.url }}" class="card-img-top" alt="{{ food.name }}">
        {% endif %}
        <div class="card-body text-center">
          <h5 class="card-title">{{ food.name }}</h5>
          <p class="text-muted">₹{{ food.price }}</p>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="text-center mt-4">
    <a href="/order/" class="btn btn-primary">Place Order</a>
  </div>
</body>
</html>
