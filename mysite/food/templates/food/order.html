<!DOCTYPE html>
<html>
<head>
  <title>Place Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h1>Place Your Order</h1>
  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <input name="name" placeholder="Your Name" class="form-control" required>
    </div>
    <div class="mb-3">
      <input name="phone" placeholder="Phone" class="form-control" required>
    </div>
    <div class="mb-3">
      <textarea name="address" placeholder="Address" class="form-control" required></textarea>
    </div>
    <div class="mb-3">
      <label for="item" class="form-label">Select Food Item:</label>
      <select name="item" id="item" class="form-select" required>
        <option value="">-- Choose a food item --</option>
        {% for food in foods %}
          <option value="{{ food.id }}">{{ food.name }} - ₹{{ food.price }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="quantity" class="form-label">Quantity:</label>
      <input type="number" name="quantity" id="quantity" class="form-control" value="1" min="1" required>
    </div>
    <button type="submit" class="btn btn-success">Submit Order</button>
  </form>
</body>
</html>
