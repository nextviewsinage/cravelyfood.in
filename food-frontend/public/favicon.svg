<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a1a"/>
  <!-- Burger bun top -->
  <ellipse cx="32" cy="22" rx="16" ry="8" fill="#e8a020"/>
  <ellipse cx="32" cy="20" rx="16" ry="7" fill="#f5b942"/>
  <!-- Sesame seeds -->
  <ellipse cx="26" cy="18" rx="2" ry="1" fill="#c8860a" transform="rotate(-20 26 18)"/>
  <ellipse cx="32" cy="16" rx="2" ry="1" fill="#c8860a"/>
  <ellipse cx="38" cy="18" rx="2" ry="1" fill="#c8860a" transform="rotate(20 38 18)"/>
  <!-- Lettuce -->
  <ellipse cx="32" cy="27" rx="17" ry="3" fill="#4caf50"/>
  <!-- Patty -->
  <ellipse cx="32" cy="30" rx="16" ry="4" fill="#6d3a1f"/>
  <!-- Cheese -->
  <ellipse cx="32" cy="33" rx="17" ry="2.5" fill="#f5c518"/>
  <!-- Bun bottom -->
  <ellipse cx="32" cy="36" rx="16" ry="5" fill="#e8a020"/>
  <!-- Lightning bolt -->
  <polygon points="40,14 35,26 39,26 34,40 44,24 40,24" fill="#FFD700" opacity="0.95"/>
  <!-- Speed lines -->
  <line x1="8" y1="28" x2="18" y2="28" stroke="#ff4500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="33" x2="16" y2="33" stroke="#ff6a00" stroke-width="2" stroke-linecap="round"/>
  <line x1="9" y1="38" x2="17" y2="38" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
</svg>
